<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2026世界杯数据看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:KaiTi,Georgia,serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:30px 20px;text-align:center;border-bottom:2px solid #0f3460}
.header h1{font-size:2em;color:#fff;text-shadow:0 0 20px rgba(0,100,255,0.5)}
.header .sub{color:#888;margin-top:8px;font-size:0.9em}
.container{max-width:1200px;margin:0 auto;padding:20px}
.section{margin-bottom:40px}
.section h2{font-size:1.4em;color:#4fc3f7;margin-bottom:15px;padding-bottom:8px;border-bottom:1px solid #333}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.tab{padding:8px 16px;background:#1a1a2e;border:1px solid #333;border-radius:6px;cursor:pointer;transition:all 0.2s;color:#ccc}
.tab:hover{background:#16213e;border-color:#4fc3f7}
.tab.active{background:#0f3460;border-color:#4fc3f7;color:#fff}
.panel{display:none}
.panel.active{display:block}
.club-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:15px}
.club-card{background:#111;border:1px solid #222;border-radius:8px;padding:15px}
.club-card h3{font-size:1.1em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #333}
.club-card h3 .rank{color:#4fc3f7;margin-right:8px}
.club-card .players{display:flex;flex-wrap:wrap;gap:6px}
.player-tag{background:#1a1a2e;padding:3px 10px;border-radius:4px;font-size:0.85em}
.player-tag .club{color:#666;font-size:0.8em}
.match{background:#111;border:1px solid #222;border-radius:8px;margin-bottom:12px;overflow:hidden}
.match-header{background:#16213e;padding:12px 15px;display:flex;justify-content:space-between;align-items:center}
.match-header .teams{font-size:1.1em;font-weight:bold}
.match-header .info{color:#888;font-size:0.85em}
.match-events{padding:12px 15px}
.event{padding:4px 0;font-size:0.9em;display:flex;gap:10px}
.event .time{color:#4fc3f7;min-width:50px;font-weight:bold}
.event .detail{flex:1}
.event .club{color:#666;font-size:0.85em;margin-left:6px}
.goal{color:#4caf50}
.card-y{color:#ffc107}
.card-r{color:#f44336}
.own{color:#9e9e9e}
.loading{text-align:center;padding:40px;color:#666}
.loading .spinner{display:inline-block;width:30px;height:30px;border:3px solid #333;border-top-color:#4fc3f7;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:40px;color:#f44336}
.leaderboard{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.lb-col h3{color:#4fc3f7;margin-bottom:10px;font-size:1.1em}
.lb-row{display:flex;justify-content:space-between;padding:6px 10px;border-bottom:1px solid #222;font-size:0.9em}
.lb-row:nth-child(even){background:#0d0d0d}
.lb-row .name{flex:1}
.lb-row .count{color:#4fc3f7;min-width:30px;text-align:right}
@media(max-width:768px){.leaderboard{grid-template-columns:1fr}.club-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
<h1>⚽ 2026世界杯数据看板</h1>
<div class="sub">数据实时更新 | 来源: github.com/zhxbayernfan/FIFAWorldCup2026</div>
</div>
<div class="container" id="app">
<div class="loading"><div class="spinner"></div><br>加载数据中...</div>
</div>
<script>
const RAW='https://raw.githubusercontent.com/zhxbayernfan/FIFAWorldCup2026/refs/heads/main';
const GROUPS='ABCDEFGHIJKL'.split('');
const GROUP_NAMES={A:'A组',B:'B组',C:'C组',D:'D组',E:'E组',F:'F组',G:'G组',H:'H组',I:'I组',J:'J组',K:'K组',L:'L组'};

async function load(){
  try{
    const [qr,...groups]=await Promise.all([
      fetch(RAW+'/FIFAWorldCup2026-QuickResult-Show.txt').then(r=>r.text()),
      ...GROUPS.map(g=>fetch(RAW+`/Group_Result/${g}.txt`).then(r=>r.text()).catch(()=>null))
    ]);
    render(qr,groups);
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="error">加载失败: ${e.message}<br>请检查网络连接</div>`;
  }
}

function parseLeaderboard(txt){
  const m=txt.match(/进球:[\s\S]*?助攻:/);
  if(!m) return {goals:[],assists:[]};
  const goalsPart=m[0].replace('进球:','').replace('助攻:','');
  const assM=txt.match(/助攻:[\s\S]*?-{10}/);
  const assPart=assM?assM[0].replace('助攻:','').replace(/-{10}/,''):'';
  return {goals:parseClubList(goalsPart),assists:parseClubList(assPart)};
}

function parseClubList(txt){
  const lines=txt.trim().split('\n').filter(l=>l.match(/^\d+\./));
  return lines.map(l=>{
    const rank=l.match(/^(\d+)/)[1];
    const name=l.match(/([一-龥\w.]+)\d+/)?.[1]||'';
    const count=l.match(/\d+([一-龥\w.]+)(\d+)/)?.[2]||'0';
    const players=l.match(/\(([^)]+)\)/)?.[1]||'';
    return {rank:+rank,name,count:+count,players};
  });
}

function parseMatchLine(line){
  const m=line.match(/([A-Z]+)\s?组?\s?([一-龥\w]+)\(([A-Z]{2,3})\)(\d+-\d+)([一-龥\w]+)\(([A-Z]{2,3})\)\s+\[(\d{2}:\d{2})\]/);
  if(!m) return null;
  return {
    group:m[1],home:m[2],homeCode:m[3],score:m[4],away:m[5],awayCode:m[6],time:m[7]
  };
}

function parseEvents(text){
  const events=[];
  const lines=text.split('\n').filter(l=>l.startsWith('-'));
  for(const line of lines){
    const m=line.match(/-([A-Z]{2,3})-(\d+(?:\+\d+)?)'([一-龥\w.]+)(?:\[([^\]]+)\])?\((\d+(?:\|[\d.]+)?)?\)(.+?)(?:\((.+?)\))?$/);
    if(!m) continue;
    events.push({
      code:m[1],time:m[2],player:m[3],club:m[4]||'',count:m[5]||'',event:m[6],assist:m[7]||''
    });
  }
  return events;
}

function render(qr,groups){
  const app=document.getElementById('app');
  const lb=parseLeaderboard(qr);

  let html='<div class="section"><h2>🏆 俱乐部进球/助攻榜</h2><div class="leaderboard">';
  html+='<div class="lb-col"><h3>⚽ 进球</h3>';
  for(const c of lb.goals) html+=`<div class="lb-row"><span class="name">${c.rank}. ${c.name} ${c.players?'('+c.players+')':''}</span><span class="count">${c.count}</span></div>`;
  html+='</div><div class="lb-col"><h3>🅰️ 助攻</h3>';
  for(const c of lb.assists) html+=`<div class="lb-row"><span class="name">${c.rank}. ${c.name} ${c.players?'('+c.players+')':''}</span><span class="count">${c.count}</span></div>`;
  html+='</div></div></div>';

  html+='<div class="section"><h2>📋 按组别查看</h2><div class="tabs" id="grpTabs">';
  for(const g of GROUPS) html+=`<div class="tab${g==='A'?' active':''}" data-g="${g}">${GROUP_NAMES[g]}</div>`;
  html+='</div>';

  for(let i=0;i<GROUPS.length;i++){
    const g=GROUPS[i],data=groups[i];
    html+=`<div class="panel${g==='A'?' active':''}" id="p${g}">`;
    if(!data){html+='<div class="loading">暂无数据</div>';html+='</div>';continue;}
    const lines=data.trim().split('\n');
    let curMatch=null,evts=[];
    for(const line of lines){
      const matchInfo=parseMatchLine(line);
      if(matchInfo){
        if(curMatch) html+=renderMatch(curMatch,evts);
        curMatch=matchInfo;evts=[];
      }else if(line.startsWith('-')){
        evts.push(line);
      }
    }
    if(curMatch) html+=renderMatch(curMatch,evts);
    html+='</div>';
  }
  html+='</div>';
  app.innerHTML=html;

  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick=()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('p'+t.dataset.g).classList.add('active');
    };
  });
}

function renderMatch(match,evts){
  const events=evts.map(e=>{
    const m=e.match(/-([A-Z]{2,3})-(\d+(?:\+\d+)?)'([一-龥\w.]+)(?:\[([^\]]+)\])?\((\d+(?:\|[\d.]+)?)?\)(.+?)(?:\((.+?)\))?$/);
    if(!m) return '';
    const isGoal=m[6].includes('破门')||m[6].includes('点球');
    const isCard=m[6].includes('牌');
    const isOwn=m[6].includes('乌龙');
    let cls='';
    if(isGoal) cls='goal';
    else if(isOwn) cls='own';
    else if(m[6].includes('红牌')) cls='card-r';
    else if(isCard) cls='card-y';
    let icon='';
    if(isGoal) icon='⚽';
    else if(isOwn) icon='🥅';
    else if(m[6].includes('红牌')) icon='🟥';
    else if(isCard) icon='🟨';
    return `<div class="event"><span class="time">${m[2]}'</span><span class="detail ${cls}">${icon} ${m[3]}${m[4]?`<span class="club">[${m[4]}]</span>`:''} ${m[6]}${m[7]?` (${m[7]})`:''}</span></div>`;
  }).filter(Boolean).join('');

  return `<div class="match"><div class="match-header"><div class="teams">${match.group}组 ${match.home}(${match.homeCode}) ${match.score} ${match.away}(${match.awayCode})</div><div class="info">${match.time}</div></div><div class="match-events">${events}</div></div>`;
}

load();
</script>
</body>
</html>
